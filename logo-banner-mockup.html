<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PMMSherpa - Logo Banner Mockup v4</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Product+Sans&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; background: #fff; color: #191c1e; }

    /* ── Hero with background image ── */
    .hero {
      position: relative;
      text-align: center;
      padding: 60px 20px 44px;
      overflow: hidden;
    }
    .hero-bg {
      position: absolute;
      inset: 0;
      background: url('https://pmmsherpa.com/homepage/hero-background.png') center top / contain no-repeat;
      opacity: 0.30;
      pointer-events: none;
    }
    .hero-bg-fade {
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, transparent 40%, rgba(255,255,255,0.5) 70%, #fff 100%);
      pointer-events: none;
    }
    .hero-content { position: relative; z-index: 1; max-width: 720px; margin: 0 auto; }
    .hero-orb {
      width: 80px; height: 80px;
      margin: 0 auto 24px;
      background: linear-gradient(135deg, #4285f4, #2563eb);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 8px 32px rgba(37,99,235,0.25);
    }
    .hero-orb svg { width: 36px; height: 36px; }
    .hero h1 { font-size: 3.2rem; font-weight: 800; letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 16px; }
    .hero h1 span { background: linear-gradient(90deg, #0058be, #2170e4); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .hero p { font-size: 1.1rem; color: #5f6368; max-width: 540px; margin: 0 auto 28px; line-height: 1.6; }
    .hero-buttons { display: flex; gap: 12px; justify-content: center; }
    .hero-buttons a { padding: 13px 30px; border-radius: 999px; font-size: 0.95rem; font-weight: 600; text-decoration: none; }
    .btn-primary { background: #2563eb; color: #fff; }
    .btn-secondary { border: 1.5px solid #d1d5db; color: #191c1e; background: #fff; }

    /* ── Logo Ribbon — Modular-style ── */
    .logo-ribbon {
      padding: 14px 0 16px;
      background: #fff;
      overflow: hidden;
    }
    .logo-ribbon-label {
      text-align: center;
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #c0c5cc;
      margin-bottom: 12px;
    }

    .logo-row {
      position: relative;
      width: 100%;
      overflow: hidden;
      height: 42px;
      margin-bottom: 8px;
      /* CSS mask for edge fading — Modular style */
      -webkit-mask-image: linear-gradient(90deg, transparent 0%, #000 12%, #000 88%, transparent 100%);
      mask-image: linear-gradient(90deg, transparent 0%, #000 12%, #000 88%, transparent 100%);
    }
    .logo-row:last-child { margin-bottom: 0; }

    .logo-track {
      display: flex;
      align-items: center;
      width: max-content;
    }

    .scroll-left  .logo-track { animation: scrollLeft  55s linear infinite; }
    .scroll-right .logo-track { animation: scrollRight 60s linear infinite; }

    @keyframes scrollLeft {
      0%   { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }
    @keyframes scrollRight {
      0%   { transform: translateX(-50%); }
      100% { transform: translateX(0); }
    }

    .logo-row:hover .logo-track { animation-play-state: paused; }

    /* Each logo — wordmark style */
    .logo-item {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 42px;
      margin-right: 80px;
      opacity: 0.40;
      filter: grayscale(100%);
      transition: opacity 0.3s ease, filter 0.3s ease;
    }
    .logo-item:hover {
      opacity: 0.75;
      filter: grayscale(0%);
    }
    .logo-item img {
      height: 28px;
      width: auto;
      object-fit: contain;
    }
    /* Wordmark text logos — sized to match Modular's 3rem aesthetic */
    .wm {
      font-weight: 700;
      font-size: 1.45rem;
      color: #1a1a1a;
      white-space: nowrap;
      letter-spacing: -0.02em;
      line-height: 42px;
      font-family: 'Inter', sans-serif;
    }
    /* Brand-specific sizing tweaks */
    .wm-sm { font-size: 1.25rem; }
    .wm-xs { font-size: 1.15rem; }
    .wm-lg { font-size: 1.6rem; }

    /* ── Rest of page ── */
    .rest-of-page {
      padding: 80px 20px;
      text-align: center;
      color: #9ca3af;
      font-size: 0.9rem;
      border-top: 1px solid #f0f0f0;
    }
  </style>
</head>
<body>

  <!-- Hero with background graphic -->
  <div class="hero">
    <div class="hero-bg"></div>
    <div class="hero-bg-fade"></div>
    <div class="hero-content">
      <div class="hero-orb">
        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="4 17 10 11 14 15 20 9"></polyline>
          <circle cx="20" cy="9" r="1.5" fill="white"></circle>
        </svg>
      </div>
      <h1>Stop guessing.<br><span>Start knowing.</span></h1>
      <p>PMMSherpa gives product marketers the strategic depth, practitioner experience, and ready-to-ship deliverables to move with confidence, not just speed.</p>
      <div class="hero-buttons">
        <a href="#" class="btn-primary">Request Access →</a>
        <a href="#" class="btn-secondary">Sign In</a>
      </div>
    </div>
  </div>

  <!-- Logo Ribbon -->
  <section class="logo-ribbon">
    <div class="logo-ribbon-label">Trusted by GTM experts at</div>

    <!-- Row 1: Mixed big + small, scrolling left -->
    <div class="logo-row scroll-left">
      <div class="logo-track" id="row1"></div>
    </div>

    <!-- Row 2: Mixed big + small, scrolling right -->
    <div class="logo-row scroll-right">
      <div class="logo-track" id="row2"></div>
    </div>
  </section>

  <div class="rest-of-page">
    ↓ Rest of homepage continues below ↓
  </div>

  <script>
    // Top 35 companies — split and shuffled across rows
    // Using inline SVG wordmarks for recognizable rendering
    const row1 = [
      { name: 'Google',     svg: `<svg viewBox="0 0 272 92" height="28"><path fill="#4285F4" d="M115.75 47.18c0 12.77-9.99 22.18-22.25 22.18s-22.25-9.41-22.25-22.18C71.25 34.32 81.24 25 93.5 25s22.25 9.32 22.25 22.18zm-9.74 0c0-7.98-5.79-13.44-12.51-13.44S80.99 39.2 80.99 47.18c0 7.9 5.79 13.44 12.51 13.44s12.51-5.55 12.51-13.44z"/><path fill="#EA4335" d="M163.75 47.18c0 12.77-9.99 22.18-22.25 22.18s-22.25-9.41-22.25-22.18C119.25 34.32 129.24 25 141.5 25s22.25 9.32 22.25 22.18zm-9.74 0c0-7.98-5.79-13.44-12.51-13.44s-12.51 5.46-12.51 13.44c0 7.9 5.79 13.44 12.51 13.44s12.51-5.55 12.51-13.44z"/><path fill="#FBBC05" d="M209.75 26.34v39.82c0 16.38-9.66 23.07-21.08 23.07-10.75 0-17.22-7.19-19.66-13.07l8.48-3.53c1.51 3.61 5.21 7.87 11.17 7.87 7.31 0 11.84-4.51 11.84-13v-3.19h-.34c-2.18 2.69-6.38 5.04-11.68 5.04-11.09 0-21.25-9.66-21.25-22.09 0-12.52 10.16-22.26 21.25-22.26 5.29 0 9.49 2.35 11.68 4.96h.34v-3.61h9.25zm-8.56 20.92c0-7.81-5.21-13.52-11.84-13.52-6.72 0-12.35 5.71-12.35 13.52 0 7.73 5.63 13.36 12.35 13.36 6.63 0 11.84-5.63 11.84-13.36z"/><path fill="#4285F4" d="M225 3v65h-9.5V3h9.5z"/><path fill="#34A853" d="M262.02 54.48l7.56 5.04c-2.44 3.61-8.32 9.83-18.48 9.83-12.6 0-22.01-9.74-22.01-22.18 0-13.19 9.49-22.18 20.92-22.18 11.51 0 17.14 9.16 18.98 14.11l1.01 2.52-29.65 12.28c2.27 4.45 5.8 6.72 10.75 6.72 4.96 0 8.4-2.44 10.92-6.14zm-23.27-7.98l19.82-8.23c-1.09-2.77-4.37-4.7-8.23-4.7-4.95 0-11.84 4.37-11.59 12.93z"/><path fill="#EA4335" d="M35.29 41.19V32H67.6c.32 1.68.48 3.66.48 5.81 0 7.22-1.98 16.15-8.35 22.52C53.51 66.7 45.53 70 35.29 70 16.15 70 0 54.38 0 35.18S16.15.36 35.29.36c10.58 0 18.14 4.15 23.79 9.57l-6.69 6.69c-4.04-3.78-9.49-6.72-17.1-6.72-13.95 0-24.88 11.26-24.88 25.28s10.93 25.28 24.88 25.28c9.07 0 14.24-3.61 17.56-6.97 2.69-2.69 4.45-6.55 5.14-11.83l-22.7-.03z"/></svg>` },
      { name: 'Neo4j',      wm: 'neo4j', cls: 'wm-sm' },
      { name: 'Cisco',      wm: 'CISCO', cls: 'wm-lg' },
      { name: 'Perplexity',  wm: 'perplexity', cls: 'wm-sm' },
      { name: 'Boeing',     wm: 'BOEING', cls: '' },
      { name: 'Highspot',   wm: 'Highspot', cls: 'wm-sm' },
      { name: 'NVIDIA',     wm: 'NVIDIA', cls: 'wm-lg' },
      { name: 'MacPaw',     wm: 'MacPaw', cls: 'wm-sm' },
      { name: 'SAP',        wm: 'SAP', cls: 'wm-lg' },
      { name: 'ChargePoint', wm: 'ChargePoint', cls: 'wm-xs' },
      { name: 'Atlassian',  wm: 'Atlassian', cls: '' },
      { name: 'Canonical',  wm: 'canonical', cls: 'wm-sm' },
      { name: 'UiPath',     wm: 'UiPath', cls: '' },
      { name: 'Box',        wm: 'Box', cls: '' },
      { name: 'Oracle',     wm: 'ORACLE', cls: '' },
      { name: 'Cvent',      wm: 'Cvent', cls: 'wm-sm' },
      { name: 'BCG',        wm: 'BCG', cls: 'wm-lg' },
      { name: 'Swiggy',     wm: 'Swiggy', cls: 'wm-sm' },
    ];

    const row2 = [
      { name: 'Amazon',     wm: 'amazon', cls: 'wm-lg', style: 'font-weight:800;letter-spacing:-0.03em' },
      { name: 'Carta',      wm: 'Carta', cls: 'wm-sm' },
      { name: 'IBM',        wm: 'IBM', cls: 'wm-lg', style: 'letter-spacing:0.08em' },
      { name: 'Guidewire',  wm: 'Guidewire', cls: 'wm-xs' },
      { name: 'T-Mobile',   wm: 'T-Mobile', cls: '' },
      { name: 'Scale AI',   wm: 'Scale AI', cls: 'wm-sm' },
      { name: 'Uber',       wm: 'Uber', cls: 'wm-lg' },
      { name: 'Clio',       wm: 'Clio', cls: 'wm-sm' },
      { name: 'Okta',       wm: 'okta', cls: '' },
      { name: 'InMobi',     wm: 'InMobi', cls: 'wm-sm' },
      { name: 'WhatsApp',   wm: 'WhatsApp', cls: '' },
      { name: 'Upstart',    wm: 'Upstart', cls: 'wm-sm' },
      { name: 'PAN',        wm: 'Palo Alto Networks', cls: 'wm-xs' },
      { name: 'Ping',       wm: 'Ping Identity', cls: 'wm-xs' },
      { name: 'GSK',        wm: 'GSK', cls: 'wm-lg' },
      { name: 'CZI',        wm: 'CZI', cls: 'wm-sm' },
      { name: 'Indeed',     wm: 'Indeed', cls: '' },
    ];

    function renderRow(id, logos) {
      const el = document.getElementById(id);
      const html = logos.map(l => {
        if (l.svg) {
          return `<div class="logo-item">${l.svg}</div>`;
        }
        const cls = l.cls ? `wm ${l.cls}` : 'wm';
        const style = l.style ? ` style="${l.style}"` : '';
        return `<div class="logo-item"><span class="${cls}"${style}>${l.wm}</span></div>`;
      }).join('');
      el.innerHTML = html + html; // duplicate for seamless loop
    }

    renderRow('row1', row1);
    renderRow('row2', row2);
  </script>
</body>
</html>
