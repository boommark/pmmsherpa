name: Keep serverless functions warm

# Vercel Hobby blocks sub-daily crons (verified 2026-05-09), so GitHub
# Actions drives the warm-up instead. With Fluid compute enabled, warming
# one route keeps the shared instance pool warm for the whole deployment,
# including /api/mcp.
#
# Requires the repo secret WARM_CRON_SECRET set to the same value as the
# CRON_SECRET env var in Vercel:
#   gh secret set WARM_CRON_SECRET --repo boommark/pmmsherpa

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch: {}

jobs:
  warm:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Ping production /api/warm
        run: |
          code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 \
            -H "Authorization: Bearer ${{ secrets.WARM_CRON_SECRET }}" \
            https://pmmsherpa.com/api/warm)
          echo "prod: $code"
          test "$code" = "200"
      - name: Ping staging /api/warm
        # Staging warmth is best-effort; don't fail the job over it.
        continue-on-error: true
        run: |
          code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 \
            -H "Authorization: Bearer ${{ secrets.WARM_CRON_SECRET }}" \
            https://staging.pmmsherpa.com/api/warm)
          echo "staging: $code"
